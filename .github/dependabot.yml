version: 2
updates:
  # npm/pnpm: take minor + patch automatically so `pnpm audit` stays green,
  # but ignore major bumps (e.g. TypeScript 6, Vite 8) — those are adopted
  # deliberately, not on a weekly schedule. Security advisories are delivered
  # by GitHub's separate security-update path regardless of these rules.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  # GitHub Actions update infrequently and major tags track runner/runtime
  # deprecations, so allow majors here.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
