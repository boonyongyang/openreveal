version: 2
updates:
  # Keep npm/pnpm dependencies patched so `pnpm audit` stays green over time.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development

  # Keep GitHub Actions current (e.g. Node runtime deprecations).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
