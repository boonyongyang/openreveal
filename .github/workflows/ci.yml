name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save runner time.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      APP_BASE_URL: http://localhost:5173
      API_BASE_URL: http://localhost:4000
      DATABASE_URL: file:./data/ci.sqlite
      SESSION_SECRET: ci-openreveal-secret-with-at-least-32-chars
      PERFORMER_PASSPHRASE: openreveal-dev
      SESSION_TTL_MINUTES: "30"
      PORT: "4000"
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22.12"
          # pnpm is installed in the next step, so disable v5's auto package-
          # manager cache detection (it would look for pnpm before it exists).
          package-manager-cache: false

      - name: Install pnpm
        run: npm install -g pnpm@10.10.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level moderate

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Run workspace checks
        run: pnpm check

      - name: Run browser flows
        run: pnpm test:e2e

      - name: Build production Docker image
        run: docker build -t openreveal:ci .

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22.12"
          # pnpm is installed in the next step, so disable v5's auto package-
          # manager cache detection (it would look for pnpm before it exists).
          package-manager-cache: false

      - name: Install pnpm
        run: npm install -g pnpm@10.10.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm build

      - name: Enforce security defenses (smoke + abuse probe)
        env:
          APP_BASE_URL: http://localhost:4000
          API_BASE_URL: http://localhost:4000
          DATABASE_URL: file:./data/ci-security.sqlite
          SESSION_SECRET: ci-openreveal-secret-with-at-least-32-chars
          PERFORMER_PASSPHRASE: ci-probe-passphrase
          PORT: "4000"
        run: |
          set -euo pipefail
          WEB_DIST_DIR="$PWD/apps/web/dist" node apps/api/dist/index.js > /tmp/api.log 2>&1 &
          API_PID=$!
          trap 'kill $API_PID 2>/dev/null || true' EXIT
          for _ in $(seq 1 60); do
            curl -fs -o /dev/null http://localhost:4000/api/health && break
            sleep 0.5
          done
          curl -fs -o /dev/null http://localhost:4000/api/health || { echo "API did not start"; cat /tmp/api.log; exit 1; }
          node scripts/deployment-smoke.mjs http://localhost:4000
          PROBE_PASSPHRASE="$PERFORMER_PASSPHRASE" node scripts/security-probe.mjs http://localhost:4000
