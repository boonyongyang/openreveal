<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>OpenReveal</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #080b12;
        color: #f8fafc;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(28rem, calc(100vw - 3rem));
        text-align: center;
      }

      a {
        color: #93c5fd;
      }
    </style>
    <script>
      const target = new URL("https://openreveal-tcug7qrd2a-as.a.run.app");
      target.pathname = window.location.pathname;
      target.search = window.location.search;
      target.hash = window.location.hash;
      window.location.replace(target.toString());
    </script>
  </head>
  <body>
    <main>
      <h1>Opening OpenReveal...</h1>
      <p>
        If you are not redirected automatically,
        <a id="fallback" href="https://openreveal-tcug7qrd2a-as.a.run.app">continue to OpenReveal</a>.
      </p>
    </main>
    <script>
      document.getElementById("fallback").href =
        "https://openreveal-tcug7qrd2a-as.a.run.app" +
        window.location.pathname +
        window.location.search +
        window.location.hash;
    </script>
  </body>
</html>
